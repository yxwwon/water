<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 수질 측정 데이터 시각화 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <header class="bg-blue-600 text-white shadow-md py-6 px-8">
        <h1 class="text-2xl font-bold">🌊 전국 수질 측정 자료 시각화 웹앱</h1>
        <p class="text-sm opacity-90 mt-1">지점별 측정항목의 2026년 월간 추이를 실시간으로 분석합니다.</p>
    </header>

    <main class="flex-1 p-6 max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-4 gap-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-4 h-fit">
            <h2 class="text-lg font-bold text-gray-700 border-b pb-2">📊 데이터 필터</h2>
            
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">지점명 검색/선택</label>
                <select id="stationSelect" class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-400 outline-none">
                    <option value="">데이터를 로딩 중입니다...</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">측정항목</label>
                <select id="itemSelect" class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-400 outline-none" disabled>
                    <option value="">지점을 먼저 선택하세요</option>
                </select>
            </div>
        </div>

        <div class="md:col-span-3 flex flex-col gap-6">
            
            <div id="errorBanner" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-r-xl shadow-sm">
                <div class="flex items-start">
                    <div class="flex-shrink-0 text-red-500 text-xl font-bold">⚠️</div>
                    <div class="ml-3">
                        <h3 class="text-sm font-bold text-red-800">차트 렌더링 에러</h3>
                        <div class="mt-2 text-xs text-red-700" id="errorMessage"></div>
                    </div>
                </div>
            </div>

            <div id="chartContainer" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 min-h-[500px] flex items-center justify-center relative">
                <div class="w-full h-[450px]">
                    <canvas id="waterQualityChart" class="hidden"></canvas>
                </div>
                <p id="emptyMessage" class="absolute text-gray-400 font-medium text-center">왼쪽 필터에서 지점과 항목을 선택하면 추이 그래프가 나타납니다.</p>
            </div>
            
        </div>
    </main>

    <footer class="bg-gray-100 border-t border-gray-200 text-center py-4 text-xs text-gray-500">
        &copy; 2026 전국 수질 데이터 분석 시스템.
    </footer>

    <script>
        let currentCsvData = [];
        let chartInstance = null;

        const stationSelect = document.getElementById('stationSelect');
        const itemSelect = document.getElementById('itemSelect');
        const errorBanner = document.getElementById('errorBanner');
        const errorMessage = document.getElementById('errorMessage');
        const emptyMessage = document.getElementById('emptyMessage');
        const canvas = document.getElementById('waterQualityChart');
        const ctx = canvas.getContext('2d');

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
            if (lines.length === 0) return [];
            
            const result = [];
            const headers = splitCSVLine(lines[0]).map(h => h.trim().replace(/^"|"$/g, ''));

            for (let i = 1; i < lines.length; i++) {
                const row = splitCSVLine(lines[i]);
                const obj = {};
                headers.forEach((header, index) => {
                    let val = row[index] ? row[index].trim() : '';
                    val = val.replace(/^"|"$/g, '');
                    obj[header] = val;
                });
                result.push(obj);
            }
            return result;
        }

        function splitCSVLine(line) {
            const result = [];
            let insideQuote = false;
            let current = '';
            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') {
                    insideQuote = !insideQuote;
                } else if (char === ',' && !insideQuote) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        async function loadData() {
            try {
                const currentPath = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
                const fileUrl = window.location.origin + currentPath + 'data.csv';

                const response = await fetch(fileUrl);
                if (!response.ok) throw new Error("FILE_NOT_FOUND");

                const arrayBuffer = await response.arrayBuffer();
                let decoder = new TextDecoder('utf-8');
                let csvText = decoder.decode(arrayBuffer);
                
                if (!csvText.includes('지점명') && !csvText.includes('지점코드')) {
                    decoder = new TextDecoder('euc-kr');
                    csvText = decoder.decode(arrayBuffer);
                }

                currentCsvData = parseCSV(csvText);
                if (currentCsvData.length === 0) throw new Error("NO_DATA");

                const allKeys = Object.keys(currentCsvData[0]);
                const stationKey = allKeys.find(k => k.replace(/\s+/g, '').includes('지점명')) || '지점명';

                const stations = [...new Set(currentCsvData.map(item => item[stationKey]))].filter(Boolean).sort();
                
                stationSelect.innerHTML = '<option value="">-- 지점명을 선택하세요 --</option>';
                stations.forEach(station => {
                    const opt = document.createElement('option');
                    opt.value = station; opt.textContent = station;
                    stationSelect.appendChild(opt);
                });
                errorBanner.classList.add('hidden');
            } catch (err) {
                stationSelect.innerHTML = '<option value="">로딩 실패</option>';
            }
        }

        stationSelect.addEventListener('change', () => {
            const selectedStation = stationSelect.value;
            if (!selectedStation) {
                itemSelect.innerHTML = '<option value="">-- 지점을 먼저 선택하세요 --</option>';
                itemSelect.disabled = true;
                resetChart();
                return;
            }

            const allKeys = Object.keys(currentCsvData[0]);
            const stationKey = allKeys.find(k => k.replace(/\s+/g, '').includes('지점명')) || '지점명';
            const itemKey = allKeys.find(k => k.replace(/\s+/g, '').includes('측정항목')) || '측정항목';

            const filteredRows = currentCsvData.filter(row => row[stationKey] === selectedStation);
            const items = [...new Set(filteredRows.map(row => row[itemKey]))].filter(Boolean).sort();

            itemSelect.innerHTML = '<option value="">-- 측정항목을 선택하세요 --</option>';
            items.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item; opt.textContent = item;
                itemSelect.appendChild(opt);
            });
            itemSelect.disabled = false;
            resetChart();
        });

        itemSelect.addEventListener('change', () => {
            const station = stationSelect.value;
            const item = itemSelect.value;
            if (!station || !item) { resetChart(); return; }

            const allKeys = Object.keys(currentCsvData[0]);
            const stationKey = allKeys.find(k => k.replace(/\s+/g, '').includes('지점명')) || '지점명';
            const itemKey = allKeys.find(k => k.replace(/\s+/g, '').includes('측정항목')) || '측정항목';

            const dataRow = currentCsvData.find(row => row[stationKey] === station && row[itemKey] === item);
            if (!dataRow) { resetChart(); return; }

            const chartLabels = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
            const chartData = [];

            // 공백 파괴형 월 데이터 매칭 체계
            for (let m = 1; m <= 12; m++) {
                const targetMatch = `2026년${m}월`;
                const matchedKey = allKeys.find(k => k.replace(/\s+/g, '') === targetMatch);
                let val = matchedKey ? dataRow[matchedKey] : undefined;
                
                if (val !== undefined && val !== null && val.trim() !== '') {
                    // 숫자가 비정상적으로 크면 보정 처리를 하거나, 일단 숫자로 강제 파싱합니다.
                    let parsedNum = parseFloat(val.replace(/,/g, ''));
                    chartData.push(isNaN(parsedNum) ? null : parsedNum);
                } else {
                    chartData.push(null); // 데이터가 없는 달은 빈칸 처리 (선 끊김 방지 옵션 켬)
                }
            }

            // 모든 데이터가 null인지 확인하는 안전장치
            if (chartData.every(v => v === null)) {
                alert("선택하신 지점과 항목에는 2026년 데이터가 모두 비어있습니다. 다른 항목을 선택해 보세요!");
            }

            renderChart(`${station} - ${item} 추이 (2026년)`, chartLabels, chartData);
        });

        function renderChart(label, labels, data) {
            canvas.classList.remove('hidden');
            emptyMessage.classList.add('hidden');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label, 
                        data: data,
                        borderColor: '#2563eb', 
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 3, 
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        spanGaps: true // 중간에 데이터가 비어있어도 선을 연결해 주는 유용한 옵션
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false, // 0부터 시작하면 수치 변화가 안 보일 수 있으므로 유연하게 자동 조절
                            title: { display: true, text: '측정값' }
                        }
                    }
                }
            });
        }

        function resetChart() {
            if (chartInstance) chart
